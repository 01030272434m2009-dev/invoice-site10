<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة المحادثات الطبية - الصيدلية البيطرية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --accent-color: #2c3e50;
            --accent-gold: #c5a059;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --bot-msg-bg: #f1f5f9;
            --user-msg-bg: #e0f2fe;
            --doctor-msg-bg: #f0fdf4;
            --doctor-border: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; }
        
        /* شريط العناوين الرئيسي */
        .admin-header {
            background-color: var(--accent-color);
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .admin-header h1 { font-size: 1.3rem; font-weight: 700; }
        .btn-refresh { background: var(--accent-gold); color: #fff; border: none; padding: 8px 16px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-refresh:hover { opacity: 0.9; }

        /* منطقة العمل الرئيسية المقسمة */
        .main-workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: var(--card-bg);
        }

        /* القائمة الجانبية للعملاء */
        .customers-sidebar {
            width: 320px;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }
        .sidebar-title { padding: 15px; font-weight: 700; border-bottom: 1px solid var(--border-color); background: #edf2f7; font-size: 0.95rem; color: var(--accent-color); }
        .customer-list { flex: 1; overflow-y: auto; list-style: none; }
        .customer-item { padding: 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .customer-item:hover { background: #edf2f7; }
        .customer-item.active { background: #e2e8f0; border-right: 4px solid var(--accent-gold); }
        
        .customer-info-wrapper { display: flex; align-items: center; gap: 8px; flex: 1; }
        .customer-name { font-weight: 600; font-size: 0.9rem; }
        
        /* إشعار الرسائل الجديدة غير المقروءة */
        .unread-badge {
            background-color: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .msg-count { background: #3b82f6; color: #fff; font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; }

        /* منطقة المحادثة النشطة */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #fafbfc; }
        .chat-area-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); background: #fff; font-weight: 700; }
        .chat-messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* فقاعات الرسائل داخل لوحة الأدمن */
        .message { max-width: 75%; padding: 12px 16px; font-size: 0.95rem; line-height: 1.5; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .message.user { background-color: var(--user-msg-bg); align-self: flex-start; border-top-right-radius: 4px; color: #0f172a; border-right: 4px solid #3b82f6; }
        .message.bot { background-color: var(--bot-msg-bg); align-self: flex-start; opacity: 0.85; font-style: italic; color: #475569; }
        .message.doctor { background-color: var(--doctor-msg-bg); align-self: flex-end; border-top-left-radius: 4px; color: #065f46; border-left: 4px solid var(--doctor-border); }
        .msg-info { display: block; font-size: 0.7rem; color: var(--text-muted); margin-top: 5px; }

        /* منطقة كتابة الرد */
        .reply-area { padding: 15px; border-top: 1px solid var(--border-color); background: #fff; display: flex; gap: 10px; }
        .reply-area input { flex: 1; border: 1px solid var(--border-color); padding: 12px; outline: none; border-radius: 8px; font-size: 0.95rem; background: #f8fafc; }
        .reply-area input:focus { border-color: var(--accent-gold); background: #fff; }
        .btn-reply { background: var(--accent-color); color: #fff; border: none; padding: 0 25px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-reply:hover { background: var(--accent-gold); }
        
        .no-chat-selected { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.1rem; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <header class="admin-header">
        <h1>لوحة تحكم الطبيب البيطري - إدارة المحادثات والاستشارات 🩺</h1>
        <button class="btn-refresh" onclick="loadAllChatsFromServer()">تحديث الرسائل 🔄</button>
    </header>

    <div class="main-workspace">
        <aside class="customers-sidebar">
            <div class="sidebar-title">المحادثات النشطة حسب العميل</div>
            <ul class="customer-list" id="customerListContainer">
                </ul>
        </aside>

        <main class="chat-area" id="chatAreaContainer">
            <div class="no-chat-selected" id="noChatPlaceholder">
                <span>💬 يرجى اختيار عميل من القائمة الجانبية لبدء قراءة الاستشارت ومزامة الردود حياً.</span>
            </div>
            
            <div id="activeChatWrapper" style="display: none; flex-direction: column; flex: 1; overflow: hidden;">
                <div class="chat-area-header" id="activeCustomerHeader">اسم العميل الحالي</div>
                
                <div class="chat-messages-container" id="adminMessagesDisplay">
                    </div>

                <div class="reply-area">
                    <input type="text" id="doctorReplyField" placeholder="اكتب ردك الطبي الاحترافي هنا للعميل..." onkeypress="handleAdminKeyPress(event)">
                    <button class="btn-reply" onclick="sendDoctorReply()">إرسال الرد</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SERVER_URL = "https://script.google.com/macros/s/AKfycbyIIQFvZ1GvVLWWvWFxEmLwP4ksgXbXO5K8As9PxCh2sIysTkLYVtvu7-WwirC-5NhiJw/exec";
        
        let allChatsDatabase = [];
        let activeUserIdentifier = null;

        window.onload = function() {
            loadAllChatsFromServer();
            setInterval(loadAllChatsFromServer, 7000);
        };

        function loadAllChatsFromServer() {
            fetch(`${SERVER_URL}?timestamp=${Date.now()}`)
            .then(res => res.json())
            .then(db => {
                if (db && db.allChats) {
                    allChatsDatabase = db.allChats;
                    renderCustomerList();
                    if (activeUserIdentifier) {
                        openCustomerChat(activeUserIdentifier, false); // تمرير false لمنع إعادة قفز المؤشر للأسفل باستمرار عند التحديث التلقائي
                    }
                }
            }).catch(err => console.log("خطأ في جلب الرسائل الشاملة للوحة الإدارة:", err));
        }

        // دالة مساعدة للحصول على كود فريد لآخر رسالة من العميل
        function getLastClientMessageId(user) {
            const userChats = allChatsDatabase.filter(c => c.user.toLowerCase() === user && (c.sender === 'user' || c.sender === 'bot'));
            if (userChats.length === 0) return null;
            // نأخذ آخر رسالة بناءً على ترتيبها بالقائمة
            const lastMsg = userChats[userChats.length - 1];
            return `${lastMsg.timestamp}-${lastMsg.message.substring(0, 10)}`;
        }

        function renderCustomerList() {
            const listContainer = document.getElementById('customerListContainer');
            listContainer.innerHTML = "";

            const uniqueUsers = [...new Set(allChatsDatabase.map(chat => chat.user.toLowerCase()))];

            if(uniqueUsers.length === 0) {
                listContainer.innerHTML = `<li style="padding:15px; text-align:center; color:var(--text-muted); font-size:0.85rem;">لا توجد رسائل مسجلة بالسيرفر حتى الآن.</li>`;
                return;
            }

            // جلب سجل الرسائل المقروءة من متصفح الطبيب
            const readStatus = JSON.parse(localStorage.getItem('chatsReadStatus') || '{}');

            uniqueUsers.forEach(user => {
                const userMessagesCount = allChatsDatabase.filter(c => c.user.toLowerCase() === user).length;
                
                // فحص هل توجد رسائل جديدة
                const currentLastMsgId = getLastClientMessageId(user);
                let hasUnread = false;
                
                // إذا كان العميل ليس المفتوح حالياً، ونفحص هل الرسالة الأخيرة تختلف عن المسجلة كمقروءة
                if (activeUserIdentifier !== user && currentLastMsgId) {
                    if (readStatus[user] !== currentLastMsgId) {
                        hasUnread = true;
                    }
                }

                const li = document.createElement('li');
                li.className = `customer-item ${activeUserIdentifier === user ? 'active' : ''}`;
                li.onclick = () => openCustomerChat(user, true);
                
                li.innerHTML = `
                    <div class="customer-info-wrapper">
                        <span class="customer-name">${user.toUpperCase()}</span>
                        ${hasUnread ? '<span class="unread-badge">جديد</span>' : ''}
                    </div>
                    <span class="msg-count">${userMessagesCount}</span>
                `;
                listContainer.appendChild(li);
            });
        }

        function openCustomerChat(userIdent, shouldScroll = true) {
            activeUserIdentifier = userIdent.toLowerCase();
            
            document.getElementById('noChatPlaceholder').style.display = 'none';
            document.getElementById('activeChatWrapper').style.display = 'flex';
            document.getElementById('activeCustomerHeader').innerText = `المحادثة المفتوحة الآن مع العميل: ${userIdent.toUpperCase()}`;

            // بمجرد فتح الشات: نقوم بتحديث الـ localStorage واعتبار الرسالة الحالية مقروءة
            const currentLastMsgId = getLastClientMessageId(activeUserIdentifier);
            if (currentLastMsgId) {
                const readStatus = JSON.parse(localStorage.getItem('chatsReadStatus') || '{}');
                readStatus[activeUserIdentifier] = currentLastMsgId;
                localStorage.setItem('chatsReadStatus', JSON.stringify(readStatus));
            }

            const userChats = allChatsDatabase.filter(c => c.user.toLowerCase() === activeUserIdentifier);
            
            const messagesDisplay = document.getElementById('adminMessagesDisplay');
            messagesDisplay.innerHTML = "";

            userChats.forEach(chat => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${chat.sender}`;
                
                let label = "العميل";
                if(chat.sender === 'bot') label = "الرد الآلي (AI)";
                if(chat.sender === 'doctor') label = "أنت (طبيب العيادة)";

                msgDiv.innerHTML = `
                    ${chat.message}
                    <span class="msg-info">${label} - ${chat.timestamp}</span>
                `;
                messagesDisplay.appendChild(msgDiv);
            });
            
            if (shouldScroll) {
                messagesDisplay.scrollTop = messagesDisplay.scrollHeight;
            }

            // تحديث كلاس النشاط فقط بالقائمة وحذف شارة "جديد" للعميل الحالي فوراً بدون انتظار التحديث القادم
            const items = document.querySelectorAll('.customer-item');
            items.forEach(item => {
                const nameText = item.querySelector('.customer-name').innerText.toLowerCase();
                if(nameText === activeUserIdentifier) {
                    item.classList.add('active');
                    const badge = item.querySelector('.unread-badge');
                    if(badge) badge.remove(); // حذف علامة الإشعار فوراً
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function handleAdminKeyPress(event) {
            if (event.key === 'Enter') sendDoctorReply();
        }

        function sendDoctorReply() {
            const replyInput = document.getElementById('doctorReplyField');
            const replyText = replyInput.value.trim();
            if (!replyText || !activeUserIdentifier) return;

            fetch(SERVER_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "adminReplyToChat",
                    data: {
                        userIdentifier: activeUserIdentifier,
                        message: replyText
                    }
                })
            }).then(() => {
                const messagesDisplay = document.getElementById('adminMessagesDisplay');
                const msgDiv = document.createElement('div');
                msgDiv.className = "message doctor";
                msgDiv.innerHTML = `
                    ${replyText}
                    <span class="msg-info">أنت (طبيب العيادة) - الآن (قيد المزامنة)</span>
                `;
                messagesDisplay.appendChild(msgDiv);
                messagesDisplay.scrollTop = messagesDisplay.scrollHeight;
                
                replyInput.value = "";
                
                setTimeout(loadAllChatsFromServer, 2000);
            }).catch(err => alert("فشل إرسال الرد، تحقق من اتصالك بالسيرفر."));
        }
    </script>
</body>
</html>
